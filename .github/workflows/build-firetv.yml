name: Build Fire TV APK

on:
  workflow_dispatch:
    inputs:
      zip_path:
        description: 'Path to PWABuilder source ZIP (relative to repo root)'
        required: true
        default: 'pwabuilder-source.zip'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Patch PWABuilder source for Fire TV
        run: |
          python public/patch-firetv.py "${{ github.event.inputs.zip_path }}" public/tv_banner.png
        env:
          OUTPUT_DIR: ${{ github.workspace }}/patched

      - name: Build APK
        run: |
          cd patched
          # Find the Gradle project root (contains gradlew)
          GRADLE_ROOT=$(find . -name "gradlew" -print -quit | xargs dirname)
          if [ -z "$GRADLE_ROOT" ]; then
            echo "Error: No gradlew found in patched source"
            exit 1
          fi
          cd "$GRADLE_ROOT"
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon || ./gradlew assembleDebug --no-daemon

      - name: Find built APK
        id: find_apk
        run: |
          APK=$(find patched -name "*.apk" -print -quit)
          if [ -z "$APK" ]; then
            echo "Error: No APK found after build"
            exit 1
          fi
          echo "apk_path=$APK" >> "$GITHUB_OUTPUT"
          echo "Found APK: $APK"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GlowHub-FireTV
          path: ${{ steps.find_apk.outputs.apk_path }}
          retention-days: 90
