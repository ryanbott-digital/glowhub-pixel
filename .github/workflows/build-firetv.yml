name: Build Fire TV APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: bun install

      - name: Add Android platform
        run: npx cap add android

      - name: Inject Fire TV leanback intent & banner
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"

          # Add LEANBACK_LAUNCHER intent to main activity
          sed -i 's|<category android:name="android.intent.category.LAUNCHER" />|<category android:name="android.intent.category.LAUNCHER" />\n                <category android:name="android.intent.category.LEANBACK_LAUNCHER" />|' "$MANIFEST"

          # Add leanback feature (not required) and banner attribute
          sed -i 's|<application|<uses-feature android:name="android.software.leanback" android:required="false" />\n    <application android:banner="@drawable/tv_banner"|' "$MANIFEST"

          # Add internet permission if not present
          grep -q 'android.permission.INTERNET' "$MANIFEST" || \
            sed -i 's|<application|<uses-permission android:name="android.permission.INTERNET" />\n    <application|' "$MANIFEST"

          # Copy TV banner drawable
          mkdir -p android/app/src/main/res/drawable
          cp public/tv_banner.png android/app/src/main/res/drawable/tv_banner.png

          # Set immersive fullscreen theme
          STYLES="android/app/src/main/res/values/styles.xml"
          sed -i 's|</style>|    <item name="android:windowFullscreen">true</item>\n        <item name="android:windowNoTitle">true</item>\n    </style>|' "$STYLES"

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          TASK=$( [ "${{ github.event.inputs.build_type }}" = "release" ] && echo "assembleRelease" || echo "assembleDebug" )
          ./gradlew $TASK --no-daemon

      - name: Find built APK
        id: find_apk
        run: |
          APK=$(find android -name "*.apk" -print -quit)
          if [ -z "$APK" ]; then
            echo "Error: No APK found after build"
            exit 1
          fi
          echo "apk_path=$APK" >> "$GITHUB_OUTPUT"
          echo "Found APK: $APK"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GlowHub-FireTV
          path: ${{ steps.find_apk.outputs.apk_path }}
          retention-days: 90

      - name: Commit APK to repo
        run: |
          cp "${{ steps.find_apk.outputs.apk_path }}" public/GlowHub.apk
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/GlowHub.apk
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update GlowHub.apk v3.0.0 — Capacitor WebView build"
          git push
