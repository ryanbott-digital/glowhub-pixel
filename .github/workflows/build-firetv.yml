name: Build Fire TV APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web assets
        run: bun run build

      - name: Verify dist exists
        run: |
          if [ ! -d "dist" ]; then
            echo "::error::dist/ directory not found after build"
            exit 1
          fi
          echo "✓ dist/ exists ($(du -sh dist | cut -f1))"

      - name: Verify Android platform exists
        run: |
          if [ ! -d "android" ]; then
            echo "::error::android/ directory is missing from the repository"
            exit 1
          fi
          echo "✓ android/ platform already exists"

      - name: Configure Android SDK
        run: |
          SDK_PATH=""
          for candidate in "${ANDROID_SDK_ROOT:-}" "${ANDROID_HOME:-}" "/usr/local/lib/android/sdk" "$HOME/Android/Sdk"; do
            if [ -n "$candidate" ] && [ -d "$candidate" ]; then
              SDK_PATH="$candidate"
              break
            fi
          done

          if [ -z "$SDK_PATH" ]; then
            echo "::error::Android SDK not found on runner"
            exit 1
          fi

          echo "ANDROID_HOME=$SDK_PATH" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$SDK_PATH" >> "$GITHUB_ENV"
          echo "sdk.dir=$SDK_PATH" > android/local.properties
          echo "✓ Using Android SDK at $SDK_PATH"

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0"

      - name: Sync existing Android project
        run: npx cap sync android

      - name: Inject Fire TV leanback intent & banner
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"

          # LEANBACK intent — only add if missing
          grep -q 'LEANBACK_LAUNCHER' "$MANIFEST" || \
            sed -i 's|<category android:name="android.intent.category.LAUNCHER" />|&\n                <category android:name="android.intent.category.LEANBACK_LAUNCHER" />|' "$MANIFEST"

          # Leanback + touchscreen feature flags — only add if missing
          grep -q 'android.software.leanback' "$MANIFEST" || \
            sed -i 's|<application|<uses-feature android:name="android.software.leanback" android:required="false" />\n    <uses-feature android:name="android.hardware.touchscreen" android:required="false" />\n    <application|' "$MANIFEST"

          # Banner attribute — only add if missing
          grep -q 'android:banner=' "$MANIFEST" || \
            sed -i 's|<application |<application android:banner="@drawable/tv_banner" |' "$MANIFEST"

          # Add internet permission if not present
          grep -q 'android.permission.INTERNET' "$MANIFEST" || \
            sed -i 's|<application|<uses-permission android:name="android.permission.INTERNET" />\n    <application|' "$MANIFEST"

          # Copy TV banner drawable
          mkdir -p android/app/src/main/res/drawable
          cp public/tv_banner.png android/app/src/main/res/drawable/tv_banner.png

          # Set immersive fullscreen theme on the runtime NoActionBar theme
          STYLES="android/app/src/main/res/values/styles.xml"
          python3 - <<'PY'
import re
p = "android/app/src/main/res/values/styles.xml"
s = open(p).read()
inject = (
  '        <item name="android:windowFullscreen">true</item>\n'
  '        <item name="android:windowTranslucentStatus">true</item>\n'
  '        <item name="android:windowTranslucentNavigation">true</item>\n'
)
def add(style_name, txt):
  pat = re.compile(r'(<style name="' + re.escape(style_name) + r'"[^>]*>)(.*?)(</style>)', re.S)
  def repl(m):
    body = m.group(2)
    if 'android:windowFullscreen' in body:
      return m.group(0)
    return m.group(1) + body.rstrip() + '\n' + inject + '    ' + m.group(3)
  return pat.sub(repl, txt, count=1)
s = add('AppTheme.NoActionBar', s)
s = add('AppTheme.NoActionBarLaunch', s)
open(p, 'w').write(s)
PY
          cat "$STYLES"

          echo "✓ Fire TV patches applied"
          cat "$MANIFEST" | head -40

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          TASK=$( [ "${{ github.event.inputs.build_type }}" = "release" ] && echo "assembleRelease" || echo "assembleDebug" )
          ./gradlew $TASK --no-daemon

      - name: Find built APK
        id: find_apk
        run: |
          APK=$(find android -name "*.apk" -print -quit)
          if [ -z "$APK" ]; then
            echo "::error::No APK found after build"
            exit 1
          fi
          echo "apk_path=$APK" >> "$GITHUB_OUTPUT"
          echo "✓ Found APK: $APK ($(du -sh "$APK" | cut -f1))"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GlowHub-FireTV
          path: ${{ steps.find_apk.outputs.apk_path }}
          retention-days: 90

      - name: Commit APK to repo
        run: |
          cp "${{ steps.find_apk.outputs.apk_path }}" public/GlowHub.apk
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/GlowHub.apk
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update GlowHub.apk — Fire TV Capacitor build"
          git push

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            android/app/build/reports/
            android/app/build/outputs/logs/
            android/local.properties
          retention-days: 7
          if-no-files-found: ignore
