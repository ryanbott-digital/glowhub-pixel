name: Build Fire TV APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web assets
        run: bun run build

      - name: Verify dist exists
        run: |
          if [ ! -d "dist" ]; then
            echo "::error::dist/ directory not found after build"
            exit 1
          fi
          echo "✓ dist/ exists ($(du -sh dist | cut -f1))"

      - name: Verify Android platform exists
        run: |
          if [ ! -d "android" ]; then
            echo "::error::android/ directory is missing from the repository"
            exit 1
          fi
          echo "✓ android/ platform already exists"

      - name: Configure Android SDK
        run: |
          SDK_PATH=""
          for candidate in "${ANDROID_SDK_ROOT:-}" "${ANDROID_HOME:-}" "/usr/local/lib/android/sdk" "$HOME/Android/Sdk"; do
            if [ -n "$candidate" ] && [ -d "$candidate" ]; then
              SDK_PATH="$candidate"
              break
            fi
          done

          if [ -z "$SDK_PATH" ]; then
            echo "::error::Android SDK not found on runner"
            exit 1
          fi

          echo "ANDROID_HOME=$SDK_PATH" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$SDK_PATH" >> "$GITHUB_ENV"
          echo "sdk.dir=$SDK_PATH" > android/local.properties
          echo "✓ Using Android SDK at $SDK_PATH"

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0"

      - name: Sync existing Android project
        run: npx cap sync android

      - name: Inject Fire TV leanback intent & banner
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"

          python3 - <<'PY'
          import xml.etree.ElementTree as ET
          from pathlib import Path

          ANDROID_NS = "http://schemas.android.com/apk/res/android"
          ET.register_namespace("android", ANDROID_NS)
          manifest_path = Path("android/app/src/main/AndroidManifest.xml")
          tree = ET.parse(manifest_path)
          root = tree.getroot()
          android = f"{{{ANDROID_NS}}}"

          application = root.find("application")
          if application is None:
              raise SystemExit("AndroidManifest.xml is missing <application>")

          def has_named_tag(tag: str, value: str) -> bool:
              return any(node.get(android + "name") == value for node in root.findall(tag))

          if not has_named_tag("uses-permission", "android.permission.INTERNET"):
              root.insert(0, ET.Element("uses-permission", {android + "name": "android.permission.INTERNET"}))

          existing_features = {node.get(android + "name") for node in root.findall("uses-feature")}
          insert_at = list(root).index(application)
          for feature_name in ("android.software.leanback", "android.hardware.touchscreen"):
              if feature_name not in existing_features:
                  root.insert(
                      insert_at,
                      ET.Element(
                          "uses-feature",
                          {
                              android + "name": feature_name,
                              android + "required": "false",
                          },
                      ),
                  )
                  insert_at += 1

          if application.get(android + "banner") != "@drawable/tv_banner":
              application.set(android + "banner", "@drawable/tv_banner")

          launcher_activity = None
          launcher_filter = None
          for activity in application.findall("activity"):
              for intent_filter in activity.findall("intent-filter"):
                  actions = {action.get(android + "name") for action in intent_filter.findall("action")}
                  categories = {category.get(android + "name") for category in intent_filter.findall("category")}
                  if "android.intent.action.MAIN" in actions and "android.intent.category.LAUNCHER" in categories:
                      launcher_activity = activity
                      launcher_filter = intent_filter
                      break
              if launcher_activity is not None:
                  break

          if launcher_filter is None:
              raise SystemExit("Could not find the main launcher activity in AndroidManifest.xml")

          existing_categories = {category.get(android + "name") for category in launcher_filter.findall("category")}
          if "android.intent.category.LEANBACK_LAUNCHER" not in existing_categories:
              ET.SubElement(
                  launcher_filter,
                  "category",
                  {android + "name": "android.intent.category.LEANBACK_LAUNCHER"},
              )

          tree.write(manifest_path, encoding="utf-8", xml_declaration=True)
          PY

          mkdir -p android/app/src/main/res/drawable
          cp public/tv_banner.png android/app/src/main/res/drawable/tv_banner.png

          STYLES="android/app/src/main/res/values/styles.xml"
          python3 - <<'PY'
          import re
          p = "android/app/src/main/res/values/styles.xml"
          s = open(p).read()
          inject = (
            '        <item name="android:windowFullscreen">true</item>\n'
            '        <item name="android:windowTranslucentStatus">true</item>\n'
            '        <item name="android:windowTranslucentNavigation">true</item>\n'
          )
          def add(style_name, txt):
            pat = re.compile(r'(<style name="' + re.escape(style_name) + r'"[^>]*>)(.*?)(</style>)', re.S)
            def repl(m):
              body = m.group(2)
              if 'android:windowFullscreen' in body:
                return m.group(0)
              return m.group(1) + body.rstrip() + '\n' + inject + '    ' + m.group(3)
            return pat.sub(repl, txt, count=1)
          s = add('AppTheme.NoActionBar', s)
          s = add('AppTheme.NoActionBarLaunch', s)
          open(p, 'w').write(s)
          PY
          cat "$STYLES"

          echo "✓ Fire TV patches applied"
          cat "$MANIFEST" | head -40

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          TASK=$( [ "${{ github.event.inputs.build_type }}" = "release" ] && echo "assembleRelease" || echo "assembleDebug" )
          ./gradlew $TASK --no-daemon

      - name: Find built APK
        id: find_apk
        run: |
          APK=$(find android -name "*.apk" -print -quit)
          if [ -z "$APK" ]; then
            echo "::error::No APK found after build"
            exit 1
          fi
          echo "apk_path=$APK" >> "$GITHUB_OUTPUT"
          echo "✓ Found APK: $APK ($(du -sh "$APK" | cut -f1))"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GlowHub-FireTV
          path: ${{ steps.find_apk.outputs.apk_path }}
          retention-days: 90

      - name: Commit APK to repo
        run: |
          cp "${{ steps.find_apk.outputs.apk_path }}" public/GlowHub.apk
          echo "── APK file size ──"
          ls -lh public/GlowHub.apk
          APK_BYTES=$(stat -c%s public/GlowHub.apk)
          APK_MB=$((APK_BYTES / 1024 / 1024))
          echo "APK is ${APK_MB} MB"
          if [ "$APK_MB" -ge 100 ]; then
            echo "::error::APK is ${APK_MB} MB — exceeds GitHub's 100 MB file limit. Cannot push to repo. Use the Artifacts download instead, or switch to Git LFS / GitHub Releases."
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/GlowHub.apk
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update GlowHub.apk — Fire TV Capacitor build"
          echo "── Pushing to $(git remote get-url origin) on $(git rev-parse --abbrev-ref HEAD) ──"
          git push

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            android/app/build/reports/
            android/app/build/outputs/logs/
            android/local.properties
          retention-days: 7
          if-no-files-found: ignore
